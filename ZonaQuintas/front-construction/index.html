<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zona Quintas - Próximamente</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: 'Segoe UI', Arial, sans-serif;
      box-sizing: border-box;
    }

    .fullscreen {
      background: url("construction-main.jpg") no-repeat center center;
      background-size: cover;
      background-attachment: fixed;
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .coming-soon-container {
      background: rgba(255,255,255,0.85);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      padding: 2rem 3rem;
      text-align: center;
      max-width: 90vw;
      width: 400px;
    }

    .coming-soon-title {
      font-size: 2.2rem;
      font-weight: 700;
      color: #333;
      margin-bottom: 1rem;
      letter-spacing: 1px;
    }

    .coming-soon-text {
      font-size: 1.1rem;
      color: #555;
      margin-bottom: 1.5rem;
    }

    .logo {
      width: 80px;
      margin-bottom: 1rem;
    }

    @media (max-width: 600px) {
      .coming-soon-container {
        padding: 1rem;
        width: 95vw;
      }
      .coming-soon-title {
        font-size: 1.5rem;
      }
      .logo {
        width: 60px;
      }
    }
  </style>
</head>
<body>
  <div class="fullscreen">
    <div class="coming-soon-container">
      <!-- Si tienes un logo, ponlo aquí -->

</html>
